<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Ping Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 Web Ping Simulator</h1>
            <p>Test network connectivity and response times</p>
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="url-input">Target URL:</label>
                <input 
                    type="text" 
                    id="url-input" 
                    placeholder="https://example.com" 
                    value="https://api2.cursor.sh"
                >
            </div>

            <div class="button-group">
                <button id="start-btn" class="btn btn-primary">Start Ping</button>
                <button id="stop-btn" class="btn btn-secondary" disabled>Stop Ping</button>
                <button id="clear-btn" class="btn btn-tertiary">Clear Results</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value" id="status">Idle</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Sent</div>
                <div class="stat-value" id="sent-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Failed</div>
                <div class="stat-value" id="failed-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Start Time</div>
                <div class="stat-value" id="start-time">--:--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Elapsed</div>
                <div class="stat-value" id="elapsed-time">0s</div>
            </div>
        </div>

        <div class="results">
            <h2>Results</h2>
            <div id="results-container" class="results-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
